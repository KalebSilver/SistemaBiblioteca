<!DOCTYPE html>

<html>

<head>

<title>Empréstimos</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div class="container">


<h1>
Registrar Empréstimo
</h1>



<input 
id="usuario_id"
placeholder="ID do usuário">



<input 
id="livro_id"
placeholder="ID do livro">



<label>
Data prevista devolução
</label>


<input 
id="data_prevista_devolucao"
type="date">



<button onclick="realizarEmprestimo()">

Emprestar

</button>



<h2>
Empréstimos
</h2>


<table>


<thead>

<tr>

<th>Usuário</th>

<th>Livro</th>

<th>Status</th>

<th>Data</th>


</tr>


</thead>


<tbody id="listaEmprestimos">


</tbody>


</table>

<h2>
Registrar devolução
</h2>


<input 
id="emprestimo_id"
placeholder="ID do empréstimo">


<input 
id="data_devolucao"
type="date">



<button onclick="devolverLivro()">

Devolver

</button>

</div>



<script src="../js/api.js"></script>

<script src="../js/emprestimos.js"></script>


</body>


</html>
